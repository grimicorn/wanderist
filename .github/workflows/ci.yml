name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          HUSKY: 0
      - run: npm run lint:ci
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}
      - run: npx nuxt prepare
      - run: npm run test:ci

  changed:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            e2e:
              - 'app/**'
              - 'server/**'
              - 'e2e/**'
              - 'tests/**'
              - 'playwright.config.ts'
              - 'nuxt.config.ts'
              - 'package-lock.json'
              - 'package.json'

  list-specs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      specs: ${{ steps.list.outputs.specs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          persist-credentials: false
      - id: list
        run: |
          specs=$(find e2e -maxdepth 1 -name "*.spec.ts" -exec basename {} .spec.ts \; | sort | jq -R . | jq -sc .)
          echo "specs=$specs" >> $GITHUB_OUTPUT

  e2e:
    needs: [ci, changed, list-specs]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      github.event_name == 'pull_request' &&
      needs.changed.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        spec: ${{ fromJson(needs.list-specs.outputs.specs) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          HUSKY: 0
      - run: npx playwright install chromium --with-deps
      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@72ed4f69a12b6be9c16aebfad893f6a21e9aba8b # v6.4.0
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.spec }}
      - name: Run E2E tests (${{ matrix.spec }})
        run: npx playwright test e2e/${{ matrix.spec }}.spec.ts
        env:
          E2E_DATABASE_URL: ${{ steps.neon.outputs.db_url_pooled }}
          NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NUXT_CLERK_SECRET_KEY: ${{ secrets.NUXT_CLERK_SECRET_KEY }}
      - name: Delete Neon branch
        if: always()
        uses: neondatabase/delete-branch-action@4468d825d5a88ef4012f1705a82f02ec3072f776 # v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.spec }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7.0.1
        if: failure()
        with:
          name: playwright-report-${{ matrix.spec }}
          path: e2e/report/
          retention-days: 7

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan for secrets
        run: bash .github/scripts/gitleaks-scan.sh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          HUSKY: 0
      - name: Audit dependencies
        run: bash .github/scripts/audit.sh
